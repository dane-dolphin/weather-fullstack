AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Weather app frontend - S3 origin bucket (CloudFront set up manually on Pro plan)

# ──────────────────────────────────────────────────────────────────────────────
# Manual CloudFront setup (Pro plan, $15/month flat — 10M requests / 50TB)
#
# This template only provisions the S3 bucket. CloudFront is created by hand in
# the Console because the bundled-plan distributions aren't supported by
# CloudFormation. After `sam deploy`, finish the setup in the Console:
#
# 1. CloudFront → Create distribution → Pro ($15/month).
# 2. Origin 1 (S3): point at the bucket from the `BucketName` output. Choose
#    "Origin access control settings" and let the wizard create a new OAC; it
#    will offer to update the bucket policy automatically — accept that.
# 3. Origin 2 (API): hostname = ApiGatewayDomainParam value
#    (v6eerlaif9.execute-api.us-east-1.amazonaws.com), origin path = /prod,
#    HTTPS only, TLSv1.2. Origin request policy: forward all query strings and
#    whitelist the `x-api-key` header.
# 4. Default behavior → S3 origin, Redirect HTTP→HTTPS, CachingOptimized.
# 5. Behavior `/api/*` → API origin, HTTPS only, GET/HEAD/OPTIONS,
#    CachingDisabled. Attach a CloudFront Function (viewer-request) with:
#       function handler(event) {
#         var r = event.request;
#         r.uri = r.uri.replace(/^\/api/, '') || '/';
#         return r;
#       }
# 6. Custom error responses: 403 → /index.html (200), 404 → /index.html (200).
# 7. Default root object: index.html.
# ──────────────────────────────────────────────────────────────────────────────

Parameters:
  ApiGatewayDomainParam:
    Type: String
    Default: v6eerlaif9.execute-api.us-east-1.amazonaws.com
    Description: API Gateway hostname (used when configuring the CloudFront API origin manually)

  ApiGatewayStagePram:
    Type: String
    Default: prod
    Description: API Gateway stage name (used as the CloudFront origin path)

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

Outputs:
  BucketName:
    Description: S3 bucket — sync your dist/ build output here, and use as the CloudFront S3 origin
    Value: !Ref FrontendBucket

  BucketRegionalDomainName:
    Description: Regional domain name to paste into the CloudFront S3 origin config
    Value: !GetAtt FrontendBucket.RegionalDomainName
